name: Daily Security Release

on:
  schedule:
    # Run daily at 06:00 UTC — after Go releases typically land
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  UPSTREAM_REPO: mikefarah/yq

jobs:
  check-versions:
    name: Check for new versions
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.decide.outputs.should_release }}
      yq_version: ${{ steps.upstream.outputs.version }}
      go_version: ${{ steps.golang.outputs.version }}
      release_tag: ${{ steps.decide.outputs.release_tag }}
    steps:
      - name: Get latest upstream yq release tag
        id: upstream
        run: |
          LATEST_YQ=$(gh release view --repo "${{ env.UPSTREAM_REPO }}" --json tagName -q .tagName)
          echo "version=${LATEST_YQ}" >> "$GITHUB_OUTPUT"
          echo "Latest upstream yq: ${LATEST_YQ}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest stable Go version
        id: golang
        run: |
          LATEST_GO=$(curl -fsSL 'https://go.dev/dl/?mode=json' | jq -r '.[0].version' | sed 's/^go//')
          echo "version=${LATEST_GO}" >> "$GITHUB_OUTPUT"
          echo "Latest stable Go: ${LATEST_GO}"

      - name: Decide whether a release is needed
        id: decide
        run: |
          YQ_VER="${{ steps.upstream.outputs.version }}"
          GO_VER="${{ steps.golang.outputs.version }}"
          RELEASE_TAG="${YQ_VER}-go${GO_VER}"

          if gh release view "${RELEASE_TAG}" --repo "${{ github.repository }}" &>/dev/null; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "Release ${RELEASE_TAG} already exists — nothing to do."
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "New release needed: ${RELEASE_TAG}"
          fi

          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-release:
    name: Build and release
    needs: check-versions
    if: needs.check-versions.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout upstream yq at release tag
        uses: actions/checkout@v6
        with:
          repository: ${{ env.UPSTREAM_REPO }}
          ref: ${{ needs.check-versions.outputs.yq_version }}
          fetch-depth: 0

      - name: Set up Go ${{ needs.check-versions.outputs.go_version }}
        uses: actions/setup-go@v6
        with:
          go-version: ${{ needs.check-versions.outputs.go_version }}
          cache: true

      - name: Update go.mod to latest Go version
        run: |
          echo "Current go directive: $(grep '^go ' go.mod)"
          go mod edit -go=${{ needs.check-versions.outputs.go_version }}
          go mod tidy
          echo "Updated go directive: $(grep '^go ' go.mod)"

      - name: Commit go.mod changes locally
        run: |
          git config user.name "daily-release-bot"
          git config user.email "noreply@github.com"
          git add go.mod go.sum
          git diff --cached --quiet || git commit -m "bump go to ${{ needs.check-versions.outputs.go_version }}"

      - name: Run vulnerability check
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Run tests
        run: go test ./...

      - name: Compile man page markup
        run: ./scripts/generate-man-page-md.sh

      - name: Generate man page
        uses: docker://pandoc/core:2.14.2
        with:
          args: >-
            --standalone
            --to man
            --variable=title:"YQ"
            --variable=section:"1"
            --variable=header:"yq (https://github.com/mikefarah/yq/) version ${{ needs.check-versions.outputs.release_tag }}"
            --variable=author:"Mike Farah"
            --output=yq.1
            man.md

      - name: Cross compile
        env:
          GORELEASER_CURRENT_TAG: ${{ needs.check-versions.outputs.yq_version }}
        run: |
          sudo apt-get install rhash -y
          go install github.com/goreleaser/goreleaser/v2@latest
          ./scripts/xcompile.sh

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-versions.outputs.release_tag }}
          name: "yq ${{ needs.check-versions.outputs.yq_version }} (Go ${{ needs.check-versions.outputs.go_version }})"
          body: |
            Automated security build of **yq ${{ needs.check-versions.outputs.yq_version }}** compiled with **Go ${{ needs.check-versions.outputs.go_version }}**.

            - Upstream release: https://github.com/mikefarah/yq/releases/tag/${{ needs.check-versions.outputs.yq_version }}
            - Go release notes: https://go.dev/doc/devel/release#go${{ needs.check-versions.outputs.go_version }}
          files: build/*
          fail_on_unmatched_files: true
